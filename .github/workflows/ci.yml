name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json
            frontend/package-lock.json

      - name: Reject committed secrets
        run: |
          if git ls-files --error-unmatch .env app/.dev.vars simulation/.dev.vars 2>/dev/null; then
            echo "Secret files must not be committed"
            exit 1
          fi
          if git ls-files | grep -E '(^|/)\.env$|\.dev\.vars$'; then
            echo "Secret-like files tracked:"
            git ls-files | grep -E '(^|/)\.env$|\.dev\.vars$'
            exit 1
          fi

      - name: Install root + app + frontend
        run: |
          npm ci
          npm ci --prefix app
          npm ci --prefix frontend

      - name: Config drift check
        run: npm run sync-config:check

      - name: Unit tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build UI
        run: npm run build:ui

      - name: Ensure uv.lock present
        run: test -f simulation/uv.lock
